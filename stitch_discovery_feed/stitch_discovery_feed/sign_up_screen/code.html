</div>
</div>
</div>
</div>

<p class="font-body text-on-surface-variant font-medium">Get kinetic with your campus peers today.</p>

<div class="grid grid-cols-1 gap-4">
<!-- Full Name -->
<div class="bg-surface-container-low border-2 border-black p-4 group transition-all hover:bg-surface-container-highest">
<label class="block font-headline text-xs font-black uppercase tracking-widest text-primary mb-1">Full Name</label>
<input class="w-full bg-transparent border-none p-0 focus:ring-0 font-headline text-xl font-bold placeholder:text-outline-variant text-black" placeholder="Alex Kinetic" type="text"/>
</div>
<!-- Edu Email -->
<div class="bg-surface-container-low border-2 border-black p-4 group transition-all hover:bg-surface-container-highest">
<label class="block font-headline text-xs font-black uppercase tracking-widest text-primary mb-1">Edu Email</label>
<input class="w-full bg-transparent border-none p-0 focus:ring-0 font-headline text-xl font-bold placeholder:text-outline-variant text-black" placeholder="alex@university.edu" type="email"/>
</div>
<!-- Password -->

<label class="block font-headline text-xs font-black uppercase tracking-widest text-primary mb-1">Create Password</label>
<div class="flex items-center">
<input class="w-full bg-transparent border-none p-0 focus:ring-0 font-headline text-xl font-bold placeholder:text-outline-variant text-black" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined text-outline cursor-pointer">visibility</span>
</div>
</div>
</div>

<div class="absolute inset-0 bg-primary-dim translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
</button>

<div class="flex items-center gap-4 py-2">
<div class="h-[2px] flex-grow bg-black"></div>
<span class="font-headline text-xs font-black uppercase tracking-widest">Or Continue With</span>
<div class="h-[2px] flex-grow bg-black"></div>
</div>
